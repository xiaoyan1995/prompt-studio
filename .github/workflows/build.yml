name: Build Windows & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: python -m pip install pyinstaller "numpy<2" opencv-python-headless tqdm click platformdirs scenedetect onnxruntime

      - name: Install Node deps
        run: npm install
        working-directory: desktop

      - name: Compile Python server
        run: python -m PyInstaller --clean --noconfirm server-build/prompt-studio-server.spec --distpath server-dist
        working-directory: desktop

      - name: Build Electron (Windows)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --publish never && node scripts/pack-win.js
        working-directory: desktop

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            desktop/dist/*.exe
            desktop/dist/*.zip
          if-no-files-found: warn

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/*
          generate_release_notes: true
