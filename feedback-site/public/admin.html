<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>反馈管理 · Prompt Studio Desktop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
  <header class="topbar"><a class="brand" href="/"><img src="assets/prompt-studio.png" alt=""><span>Prompt Studio Desktop</span><b>反馈管理</b></a><nav class="top-actions"><a class="text-link" href="/">返回提交页</a><select id="themeSelect" class="theme-select" aria-label="主题"><option value="system">跟随系统</option><option value="light">浅色</option><option value="dark">深色</option></select></nav></header>
  <main class="admin-shell">
    <section id="loginPanel" class="login-panel"><p class="eyebrow">PRIVATE INBOX</p><h1>反馈管理</h1><p>输入管理令牌查看收到的反馈。令牌由服务启动时显示，或保存在数据目录的 <code>admin-token.txt</code>。</p><form id="loginForm" class="login-form"><label class="field"><span>管理令牌</span><input id="tokenInput" type="password" autocomplete="current-password" required></label><button class="button button-primary" type="submit">进入管理端</button></form><div id="loginError" class="alert alert-error" role="alert" hidden></div></section>
    <section id="adminPanel" hidden>
      <div class="admin-heading"><div><p class="eyebrow">PRIVATE INBOX</p><h1>反馈收件箱</h1></div><div class="admin-actions"><button class="button button-secondary" id="exportButton" type="button">导出 CSV</button><button class="button button-secondary" id="logoutButton" type="button">退出</button></div></div>
      <div class="stats" id="stats"><div><strong>0</strong><span>全部</span></div><div><strong>0</strong><span>新反馈</span></div><div><strong>0</strong><span>处理中</span></div><div><strong>0</strong><span>已解决</span></div></div>
      <div class="admin-toolbar"><input id="queryInput" type="search" placeholder="搜索编号、标题、模块"><select id="statusFilter"><option value="">全部状态</option><option value="new">新反馈</option><option value="triaged">已分诊</option><option value="in_progress">处理中</option><option value="resolved">已解决</option><option value="closed">已关闭</option></select><button class="button button-secondary" id="refreshButton" type="button">刷新</button></div>
      <div class="inbox-layout"><section class="issue-list" id="issueList" aria-live="polite"></section><section class="issue-detail" id="issueDetail"><div class="empty-state"><strong>选择一条反馈</strong><span>右侧会显示完整内容和处理记录。</span></div></section></div>
    </section>
  </main>
  <script src="admin.js" defer></script>
</body>
</html>
